<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - I-Compass</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- App Config -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/supabase-client.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1a237e;      /* Deep Navy */
            --secondary-color: #c5a059;    /* Brass/Gold */
            --accent-color: #c62828;       /* Compass Needle Red */
            --bg-color: #f5f5f7;           /* Off-white Map Paper */
            --panel-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --border-color: #e0e0e0;
            --shadow-soft: 0 8px 30px rgba(26, 35, 126, 0.08);
            --shadow-sharp: 0 2px 5px rgba(0, 0, 0, 0.05);
            --font-heading: 'Cinzel', 'Noto Serif JP', serif;
            --font-body: 'Lato', 'Noto Sans JP', sans-serif;
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            box-sizing: border-box;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header Styling */
        .dashboard-header {
            background: linear-gradient(135deg, #0b0f38 0%, #1e299a 50%, #3a1555 100%);
            border-bottom: 3px solid var(--secondary-color);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-soft);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .dashboard-header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0, 0, 0, 0.3) 100%);
            pointer-events: none;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .dashboard-header:hover .logo-icon {
            transform: rotate(360deg);
        }

        .title-group {
            display: flex;
            align-items: center;
        }

        .logo-text {
            font-family: var(--font-heading);
            font-size: 24px;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 40%, var(--secondary-color) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            margin: 0 15px;
        }

        .dashboard-title {
            font-family: var(--font-heading);
            font-size: 16px;
            color: var(--secondary-color);
            font-weight: 500;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .header-stats {
            display: flex;
            align-items: center;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.5px;
        }

        .stat-badge span {
            color: var(--secondary-color);
            font-size: 14px;
            margin-left: 3px;
        }

        /* Layout Grid Redesign */
        .dashboard-container {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 24px;
            flex-grow: 1;
            min-height: 0;
            height: calc(100vh - 120px);
            box-sizing: border-box;
        }

        /* Sidebar Styling */
        .dashboard-sidebar {
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
            min-height: 0;
        }

        .sidebar-header-area {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            background: #fafafa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .sidebar-title {
            margin: 0;
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sidebar-title::before {
            content: '';
            display: block;
            width: 4px;
            height: 14px;
            background: var(--secondary-color);
            border-radius: 2px;
        }

        /* Workspace Styling */
        .dashboard-workspace {
            min-height: 0;
            height: 100%;
        }

        .workspace-grid {
            display: grid;
            grid-template-columns: 440px 1fr;
            gap: 24px;
            height: 100%;
            min-height: 0;
        }

        /* Preview Column Mockup Frame */
        .workspace-preview-column {
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
            min-height: 0;
        }

        .preview-frame-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            background: #fafafa;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .preview-frame-title {
            font-size: 11px;
            color: var(--text-sub);
            font-weight: 700;
            margin-left: auto;
            margin-right: auto;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .qr-preview-wrapper-large {
            flex-grow: 1;
            background: #eef2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: 0;
            overflow: auto;
        }

        /* Control Panel Column */
        .workspace-controls-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
            height: 100%;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Control Cards */
        .control-card {
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .control-card-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            background: #fafafa;
            flex-shrink: 0;
        }

        .control-card-title {
            margin: 0;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .control-card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .selected-node-details {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .selected-node-floor {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            color: white;
            min-width: 32px;
            text-align: center;
        }

        .selected-node-name {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
        }

        .url-copy-box {
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-top: 1px solid #f0f0f0;
            padding-top: 16px;
            margin-top: 4px;
        }

        .copy-box-label {
            font-size: 11px;
            color: var(--text-sub);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bulk-desc {
            margin: 0;
            font-size: 12px;
            color: var(--text-sub);
            line-height: 1.5;
        }

        /* Console log panel inside control card */
        .console-card {
            flex-grow: 1;
            min-height: 200px;
            max-height: 350px;
        }

        .console-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .console-clear-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 10px;
            font-weight: 700;
            transition: color 0.2s ease;
            padding: 0;
        }

        .console-clear-btn:hover {
            color: var(--accent-color);
        }

        .log-box-new {
            flex-grow: 1;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 11px;
            line-height: 1.5;
            overflow-y: auto;
            background: #181b28;
            color: #a5b0c7;
            padding: 15px;
            white-space: pre-wrap;
            margin: 0;
            height: 100%;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 8px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            width: 100%;
            box-sizing: border-box;
            box-shadow: var(--shadow-sharp);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #0f175a;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(26, 35, 126, 0.2);
        }

        .btn-secondary {
            background-color: var(--secondary-color);
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background-color: #b28c46;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(197, 160, 89, 0.25);
        }

        .btn:disabled {
            background-color: #ccc;
            color: #777;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-icon {
            flex-shrink: 0;
        }

        .spinning {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* QR Preview Styling */
        .qr-preview-wrapper {
            background: var(--bg-color);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        #qr-preview-container {
            width: 400px;
            height: 566px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            border-radius: 8px;
            box-shadow: var(--shadow-sharp);
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .preview-placeholder {
            color: var(--text-sub);
            font-size: 12px;
            text-align: center;
            padding: 10px;
        }

        /* Node Info Table */
        .node-info-table {
            margin-bottom: 20px;
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .info-row.vertical-row {
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            border-bottom: none;
        }

        .info-label {
            color: var(--text-sub);
            font-weight: 500;
        }

        .info-value {
            color: var(--text-main);
            font-weight: 700;
        }

        .code-font {
            font-family: monospace;
            font-size: 12px;
            background: #f1f3f5;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .url-input-group {
            display: flex;
            width: 100%;
            gap: 6px;
            box-sizing: border-box;
        }

        .url-input-group input {
            flex-grow: 1;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #f8f9fa;
            font-family: monospace;
            font-size: 11px;
            outline: none;
            color: var(--text-sub);
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .icon-btn-text {
            background: white;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .icon-btn-text:hover {
            background: var(--primary-color);
            color: white;
        }

        /* Progress Bar Section */
        .progress-section {
            margin-bottom: 20px;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .progress-status {
            font-weight: 500;
            color: var(--text-main);
        }

        .progress-percent {
            font-weight: 700;
            color: var(--primary-color);
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary-color) 0%, #2e7d32 100%);
            width: 0%;
            transition: width 0.15s ease;
        }

        /* Filter Controls */
        .filter-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: #fafafa;
            flex-shrink: 0;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .search-input:focus {
            border-color: var(--primary-color);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            color: var(--text-sub);
            pointer-events: none;
        }

        .floor-filters {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }

        .floor-filters::-webkit-scrollbar {
            height: 4px;
        }

        .filter-pill {
            padding: 6px 12px;
            background: #e9ecef;
            border: none;
            border-radius: 20px;
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            color: var(--text-main);
        }

        .filter-pill:hover {
            background: #dee2e6;
        }

        .filter-pill.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* Node List Directory */
        .node-list-wrapper {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
        }

        .node-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .node-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sharp);
        }

        .node-item:hover {
            transform: translateX(4px);
            border-color: var(--secondary-color);
            background: rgba(197, 160, 89, 0.04);
        }

        .node-item.active {
            border-color: var(--primary-color);
            background: rgba(26, 35, 126, 0.02);
            box-shadow: inset 4px 0 0 var(--primary-color);
        }

        .node-item-main {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .floor-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 12px;
            white-space: nowrap;
            color: white;
            min-width: 24px;
            text-align: center;
        }

        .badge-1f { background-color: #1a237e; }
        .badge-2f { background-color: #6a1b9a; }
        .badge-3f { background-color: #2e7d32; }
        .badge-4f { background-color: #00838f; }

        .node-item-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
        }

        .node-item-meta {
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        /* Log Tab Console Styling */
        .console-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #181b28;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow-sharp);
        }

        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: #0f111a;
            border-bottom: 1px solid #23283b;
        }

        .console-title {
            color: var(--secondary-color);
            font-family: monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .console-clear-btn {
            background: none;
            border: none;
            color: #5d668c;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 10px;
            font-weight: 700;
            transition: color 0.2s ease;
            padding: 0;
        }

        .console-clear-btn:hover {
            color: #fff;
        }

        .log-box {
            flex-grow: 1;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 11px;
            line-height: 1.5;
            overflow-y: auto;
            background: #181b28;
            color: #a5b0c7;
            padding: 15px;
            white-space: pre-wrap;
            margin: 0;
        }

        /* Responsive Design */
        @media (max-width: 1100px) {
            body {
                height: auto;
                overflow: auto;
            }
            .dashboard-container {
                grid-template-columns: 1fr;
                height: auto;
                overflow: visible;
                gap: 20px;
            }
            .dashboard-sidebar {
                height: auto;
                max-height: 500px;
            }
            .node-list-wrapper {
                max-height: 350px;
            }
            .workspace-grid {
                grid-template-columns: 1fr;
                height: auto;
                gap: 20px;
            }
            .workspace-preview-column {
                height: 620px;
            }
            .console-card {
                height: 300px;
            }
        }

        /* Print Placard Styles */
        #print-container-wrapper {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 0;
            height: 0;
            overflow: hidden;
        }

        #print-container {
            display: none;
        }

        /* Preview Scale Wrapper */
        .preview-scale-wrapper {
            width: 595px;
            height: 842px;
            transform: scale(0.67);
            transform-origin: top left;
            position: absolute;
            top: 0.5px;
            left: 1px;
            pointer-events: none;
            box-sizing: border-box;
        }

        /* Print page layout (A4 dimensions) */
        .print-placard-page {
            width: 210mm;
            height: 296mm;
            box-sizing: border-box;
            padding: 12mm 10mm;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            page-break-after: always;
            page-break-inside: avoid;
            overflow: hidden;
        }

        .preview-scale-wrapper .print-placard-page {
            width: 595px;
            height: 842px;
            padding: 20px 15px;
        }

        .print-placard-page:last-child {
            page-break-after: avoid;
        }

        .print-placard {
            width: 100%;
            height: 100%;
            background: #ffffff;
            box-sizing: border-box;
            color: var(--primary-color);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .placard-border {
            border: 3px double var(--secondary-color);
            border-radius: 16px;
            padding: 45px 35px;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(26, 35, 126, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        .placard-top-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .placard-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .placard-logo {
            flex-shrink: 0;
        }

        .placard-app-title {
            font-family: var(--font-heading);
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--primary-color);
        }

        .placard-subtitle {
            font-family: var(--font-body);
            font-size: 16px;
            color: var(--text-sub);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .placard-qr-container {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background: white;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
        }

        .placard-qr-container canvas,
        .placard-qr-container img {
            display: block;
            width: 320px !important;
            height: 320px !important;
            max-width: 320px;
            max-height: 320px;
        }

        .placard-location-info {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .placard-floor-badge {
            display: inline-block;
            background-color: var(--primary-color);
            color: #ffffff;
            font-weight: 700;
            font-size: 16px;
            padding: 6px 20px;
            border-radius: 20px;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .placard-floor-badge.badge-1f, .placard-floor-badge.badge-1f-jp { background-color: #1a237e; }
        .placard-floor-badge.badge-2f, .placard-floor-badge.badge-2f-jp { background-color: #6a1b9a; }
        .placard-floor-badge.badge-3f, .placard-floor-badge.badge-3f-jp { background-color: #2e7d32; }
        .placard-floor-badge.badge-4f, .placard-floor-badge.badge-4f-jp { background-color: #00838f; }

        .placard-node-name {
            font-family: var(--font-body);
            font-size: 44px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            line-height: 1.3;
        }

        .placard-event-name {
            font-family: var(--font-heading);
            font-size: 52px;
            font-weight: 700;
            color: var(--primary-color);
            margin: 5px 0 0 0;
            line-height: 1.2;
            text-align: center;
        }

        .placard-room-name-small {
            font-family: var(--font-body);
            font-size: 24px;
            font-weight: 700;
            color: var(--text-sub);
            margin: 0;
            line-height: 1.2;
            text-align: center;
            letter-spacing: 2px;
        }

        .placard-divider {
            width: 80%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--secondary-color) 30%, var(--secondary-color) 70%, transparent);
            margin: 20px 0;
        }

        .placard-instructions {
            text-align: left;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 22px 28px;
            margin-bottom: 25px;
            border-left: 4px solid var(--secondary-color);
            width: 100%;
            box-sizing: border-box;
        }

        .instruction-title {
            font-weight: 700;
            font-size: 15px;
            color: var(--primary-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .placard-instructions ol {
            margin: 0;
            padding-left: 20px;
            font-size: 13px;
            color: var(--text-main);
            line-height: 1.7;
        }

        .placard-instructions li {
            margin-bottom: 6px;
        }

        .placard-instructions li:last-child {
            margin-bottom: 0;
        }

        .placard-footer {
            font-family: var(--font-body);
            font-size: 11px;
            color: var(--text-sub);
            letter-spacing: 1px;
            margin-top: auto;
        }

        /* Specific adjustments for on-screen scaled preview to ensure fit inside 842px height */
        .preview-scale-wrapper .placard-border {
            padding: 35px 25px;
        }
        .preview-scale-wrapper .placard-app-title {
            font-size: 36px;
        }
        .preview-scale-wrapper .placard-subtitle {
            margin-bottom: 20px;
            font-size: 15px;
        }
        .preview-scale-wrapper .placard-qr-container {
            margin-bottom: 15px;
        }
        .preview-scale-wrapper .placard-qr-container canvas,
        .preview-scale-wrapper .placard-qr-container img {
            width: 260px !important;
            height: 260px !important;
        }
        .preview-scale-wrapper .placard-floor-badge {
            font-size: 15px;
            padding: 5px 18px;
            margin-bottom: 10px;
        }
        .preview-scale-wrapper .placard-node-name {
            font-size: 40px;
        }
        .preview-scale-wrapper .placard-event-name {
            font-size: 46px;
        }
        .preview-scale-wrapper .placard-room-name-small {
            font-size: 20px;
        }
        .preview-scale-wrapper .placard-divider {
            margin: 15px 0;
        }
        .preview-scale-wrapper .placard-instructions {
            padding: 16px 22px;
            margin-bottom: 15px;
        }

        /* Print Media Styles */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            body {
                background: #ffffff !important;
                color: #000000 !important;
                margin: 0 !important;
                padding: 0 !important;
                height: auto !important;
                overflow: visible !important;
            }
            
            body > *:not(#print-container) {
                display: none !important;
            }
            
            #print-container {
                display: block !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 0;
            }

            .print-placard-page {
                width: 210mm;
                height: 296mm;
                padding: 12mm 10mm;
                box-sizing: border-box;
                display: flex !important;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                page-break-after: always;
                page-break-inside: avoid;
                background: #ffffff;
                overflow: hidden;
            }

            .print-placard-page:last-child {
                page-break-after: avoid;
            }

            .print-placard {
                max-width: 100% !important;
                width: 100% !important;
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
            }

            .placard-border {
                box-shadow: none !important;
                width: 100% !important;
                height: 100% !important;
                padding: 45px 35px;
            }
        }
    </style>
</head>

<body>

    <header class="dashboard-header">
        <div class="header-container">
            <div class="logo-area">
                <svg class="logo-icon" viewBox="0 0 24 24" width="32" height="32">
                    <circle cx="12" cy="12" r="10" stroke="var(--secondary-color)" stroke-width="1.5" fill="none"></circle>
                    <polygon points="12,3 15,12 12,12" fill="var(--accent-color)"></polygon>
                    <polygon points="12,3 9,12 12,12" fill="#ff5252"></polygon>
                    <polygon points="12,21 15,12 12,12" fill="var(--secondary-color)"></polygon>
                    <polygon points="12,21 9,12 12,12" fill="#e5c158"></polygon>

                </svg>
                <div class="title-group">
                    <h1 class="logo-text">I-Compass</h1>

    <div class="dashboard-container">

        <aside class="dashboard-sidebar">
            <div class="sidebar-header-area">
                <h3 class="sidebar-title">地点選択</h3>
                <span class="stat-badge">対象: <span id="header-total-nodes">0</span>地点</span>
            </div>
            
            <div class="filter-controls">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" class="search-input" placeholder="地点名で検索..." oninput="filterNodes()">
                </div>
                
                <div class="floor-filters" id="floor-filter-container">

            <div class="node-list-wrapper">

                </div>

        </aside>

        <!-- Main Workspace: Large placard preview & Control Panel -->
        <main class="dashboard-workspace">
            <div class="workspace-grid">
                
                <!-- Center column: A4 Placard Poster Preview -->
                <section class="workspace-preview-column">
                    <div class="preview-frame-header">
                        <span class="preview-frame-title">印刷プレビュー (A4縦)</span>
                    </div>
                    <div class="qr-preview-wrapper-large">
                        <div id="qr-preview-container">
                            <div class="preview-placeholder">地点を選択してください</div>
                        </div>
                    </div>
                </section>
                
                <!-- Right column: Selected Node controls, Bulk controls, Console Logs -->
                <section class="workspace-controls-column">
                    <!-- Card 1: Selected Node Actions -->
                    <div class="control-card">
                        <div class="control-card-header">
                            <h4 class="control-card-title">選択中の地点</h4>
                        </div>
                        <div class="control-card-body">
                            <div class="selected-node-details">
                                <span class="selected-node-floor" id="node-floor-badge">-</span>
                                <div style="display: flex; flex-direction: column;">
                                    <span id="node-room-label" style="font-size: 11px; color: var(--text-sub); font-weight: bold; margin-bottom: 2px; display: none;"></span>
                                    <h2 class="selected-node-name" id="node-name-label">地点を選択してください</h2>
                                </div>
                            </div>
                            
                            <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px;">
                                <button onclick="downloadSingle()" id="download-single-btn" class="btn btn-primary" disabled>
                                    <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                                        <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/>
                                    </svg>
                                    現在のQR（PNG）を保存
                                </button>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                                    <button onclick="downloadSinglePDF()" id="download-single-pdf-btn" class="btn btn-secondary" disabled>
                                        PDFをダウンロード

                                    <button onclick="printSingle()" id="print-single-btn" class="btn btn-secondary" style="background-color: #5d668c;" disabled>
                                        印刷する
                                    </button>

                            </div>
                            
                            <div class="url-copy-box">
                                <span class="copy-box-label">QRコードリンクURL</span>
                                <div class="url-input-group" style="display: flex; width: 100%; gap: 6px; box-sizing: border-box;">
                                    <input type="text" id="node-url" readonly value="" style="flex-grow: 1; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border-color); background: #f8f9fa; font-family: monospace; font-size: 11px; outline: none; color: var(--text-sub); text-overflow: ellipsis; white-space: nowrap; overflow: hidden;">
                                    <button onclick="copyUrl()" class="icon-btn-text" id="copy-btn">コピー</button>
                                </div>

                    </div>
                    
                    <!-- Card 2: Bulk Operations -->
                    <div class="control-card">
                        <div class="control-card-header">
                            <h4 class="control-card-title">一括エクスポート</h4>

                        <div class="control-card-body">

                            <div class="progress-section">
                                <div class="progress-meta">
                                    <span class="progress-status" id="status-text">待機中</span>

                                <div class="progress-bar">
                                    <div id="progress" class="progress-fill"></div>
                                </div>
                            </div>
                            
                            <div style="display: flex; flex-direction: column; gap: 8px;">
                                <button onclick="generateAll()" id="genBtn" class="btn btn-secondary">
                                    <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                                        <path d="M20.54 5.23l-1.39-1.68C18.88 3.21 18.47 3 18 3H6c-.47 0-.88.21-1.16.55L3.46 5.23C3.17 5.57 3 6.02 3 6.5V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6.5c0-.48-.17-.93-.46-1.27zM12 17.5L6.5 12H10v-3h4v3h3.5L12 17.5zM5.12 5l.82-1h12.06l.82 1H5.12z"/>
                                    </svg>
                                    一括生成とZIP保存 (PNG)
                                </button>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                                    <button onclick="generateAllPDF()" id="genPdfBtn" class="btn btn-primary">
                                        全地点をPDF保存
                                    </button>
                                    <button onclick="printAll()" id="printAllBtn" class="btn btn-secondary" style="background-color: #5d668c;">
                                        全地点を一括印刷

                    <!-- Card 3: Console Logs -->
                    <div class="control-card console-card">
                        <div class="control-card-header console-card-header">
                            <h4 class="control-card-title console-title">システムログ</h4>
                            <button onclick="clearLogs()" class="console-clear-btn">クリア</button>
                        </div>
                        <div id="console" class="log-box-new"></div>
                    </div>

            </div>

    <!-- Hidden container for QR generation -->
    <div id="qr-target" style="display:none;"></div>

    <!-- Off-screen container for rendering placards (for html2pdf / html2canvas) -->
    <div id="print-container-wrapper">
        <div id="print-canvas-target"></div>
    </div>

    <!-- Native print container (shown only during browser print) -->
    <div id="print-container"></div>

    <script>
        // Logger without emojis
        function log(msg, type = 'info') {
            const el = document.getElementById('console');
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0];
            
            let color = '#a5b0c7';
            if (type === 'success') color = '#4caf50';
            else if (type === 'error') color = '#f44336';
            else if (type === 'warning') color = '#ffeb3b';
            
            const line = document.createElement('div');
            line.style.marginBottom = '4px';
            line.innerHTML = `<span style="color: #5d668c;">[${timeStr}]</span> <span style="color: ${color};">> ${msg}</span>`;
            el.appendChild(line);
            el.scrollTop = el.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('console').innerHTML = '';
            log("ログをクリアしました", 'info');
        }

        // Data Store
        let allNodes = [];
        let filteredNodes = [];
        let selectedNode = null;
        let activeFloorFilter = 'all';
        let searchQuery = '';

        // Load map data
        async function loadData() {
            if (!window.adminPasscode) {
                try {
                    window.adminPasscode = await SupabaseClient.promptAdminPasscode();
                    log("管理者認証に成功しました", 'success');
                } catch (e) {
                    log("認証に失敗しました。ページをリロードしてください。", 'error');
                    alert("管理者認証が必要です。ページをリロードしてください。");
                    return;
                }
            }

            log("マップデータのロードを開始します...", 'info');
            const floors = AppConfig.FLOORS;
            allNodes = [];

            for (const floor of floors) {
                try {
                    const data = await SupabaseClient.getAdminFloorData(floor.id, window.adminPasscode);

                    data.nodes.forEach(n => {
                        n.floorId = floor.id;
                        n.floorName = floor.name;
                        n.fullId = `${floor.id}_${n.id}`;
                        allNodes.push(n);
                    });
                    log(`フロア ${floor.name} をロードしました: ${data.nodes.length} 地点`, 'info');
                } catch (e) {
                    log(`フロア ${floor.name} のロード中にエラーが発生しました: ${e.message}`, 'error');
                }
            }
            
            // Filter target nodes (Must have name and not be junction)
            allNodes = allNodes.filter(n => n.name && n.type !== 'junction');
            log(`全フロアのロードが完了しました。対象地点数: ${allNodes.length}`, 'success');
            
            // Update total badge in header
            document.getElementById('header-total-nodes').innerText = allNodes.length;
            document.getElementById('status-text').innerText = `準備完了 (${allNodes.length} 地点)`;
            
            // Initialize floor filter pills
            populateFloorFilters();
            
            // Reset filtered list
            filteredNodes = [...allNodes];
            renderNodeList();
            
            // Auto-select first node if available
            if (allNodes.length > 0) {
                selectNode(allNodes[0]);
            }
        }

        // Initialize dynamic floor filter pills
        function populateFloorFilters() {
            const container = document.getElementById('floor-filter-container');
            container.innerHTML = `<button class="filter-pill active" id="pill-all" onclick="filterFloor('all')">すべて</button>`;
            
            AppConfig.FLOORS.forEach(floor => {
                const btn = document.createElement('button');
                btn.className = 'filter-pill';
                btn.id = `pill-${floor.id}`;
                btn.innerText = floor.name;
                btn.onclick = () => filterFloor(floor.id);
                container.appendChild(btn);
            });
        }

        // Floor filter switch handler
        function filterFloor(floorId) {
            activeFloorFilter = floorId;
            
            const pills = document.querySelectorAll('.filter-pill');
            pills.forEach(p => p.classList.remove('active'));
            
            if (floorId === 'all') {
                document.getElementById('pill-all').classList.add('active');
            } else {
                const activePill = document.getElementById(`pill-${floorId}`);
                if (activePill) activePill.classList.add('active');
            }
            
            applyFilter();
        }

        // Search text change handler
        function filterNodes() {
            searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            applyFilter();
        }

        // Apply filters (Floor + Search text)
        function applyFilter() {
            filteredNodes = allNodes.filter(node => {
                const matchesFloor = (activeFloorFilter === 'all') || (node.floorId === activeFloorFilter);
                const matchesSearch = node.name.toLowerCase().includes(searchQuery) || node.fullId.toLowerCase().includes(searchQuery);
                return matchesFloor && matchesSearch;
            });
            
            renderNodeList();
        }

        // Render Directory List
        function renderNodeList() {
            const container = document.getElementById('node-list-container');
            container.innerHTML = '';
            
            if (filteredNodes.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'preview-placeholder';
                emptyMsg.style.padding = '30px';
                emptyMsg.innerText = '該当する地点が見つかりません';
                container.appendChild(emptyMsg);
                return;
            }
            
            filteredNodes.forEach(node => {
                const item = document.createElement('div');
                item.className = 'node-item';
                if (selectedNode && selectedNode.fullId === node.fullId) {
                    item.classList.add('active');
                }
                
                item.onclick = () => {
                    const items = document.querySelectorAll('.node-item');
                    items.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    
                    selectNode(node);
                };
                
                const badgeClass = `badge-${node.floorName.toLowerCase()}`;
                
                item.innerHTML = `
                    <div class="node-item-main">
                        <span class="floor-badge ${badgeClass}">${node.floorName}</span>
                        <div style="display: flex; flex-direction: column;">
                            <span class="node-item-name">${node.eventName ? node.eventName + ' <span style="font-size:11px;font-weight:normal;color:var(--text-sub);">(' + node.name + ')</span>' : node.name}</span>
                            <span class="node-item-meta">ID: ${node.fullId}</span>
                        </div>
                    </div>
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="var(--text-sub)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                `;
                
                container.appendChild(item);
            });
        }

        // Interactive QR Code Selection
        function selectNode(node) {
            selectedNode = node;
            
            // Update selected indicator in list
            const nodeItems = document.querySelectorAll('.node-item');
            nodeItems.forEach((item, idx) => {
                const itemNode = filteredNodes[idx];
                if (itemNode && itemNode.fullId === node.fullId) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            
            // Update details on control card
            document.getElementById('node-name-label').innerText = node.eventName ? node.eventName : node.name;
            const roomLabel = document.getElementById('node-room-label');
            if (node.eventName) {
                roomLabel.innerText = node.name;
                roomLabel.style.display = 'block';
            } else {
                roomLabel.style.display = 'none';
            }
            const floorBadge = document.getElementById('node-floor-badge');
            floorBadge.innerText = node.floorName;
            floorBadge.className = `selected-node-floor badge-${node.floorName.toLowerCase()}`;

            const baseUrl = window.location.href.split('?')[0].replace(/qr\.html$/, 'map.html');
            const qrUrl = `${baseUrl}?current=${node.fullId}`;
            document.getElementById('node-url').value = qrUrl;
            
            // Render Scaled Placard in Preview Area
            const previewContainer = document.getElementById('qr-preview-container');
            previewContainer.innerHTML = '';
            
            const scaleWrapper = document.createElement('div');
            scaleWrapper.className = 'preview-scale-wrapper';
            scaleWrapper.innerHTML = buildPlacardHTML(node, 'preview');
            previewContainer.appendChild(scaleWrapper);
            
            // Render QR Code inside preview wrapper placard
            const qrHolder = document.getElementById('qr-holder-preview');
            if (qrHolder) {
                new QRCode(qrHolder, {
                    text: qrUrl,
                    width: 512,
                    height: 512,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M
                });
            }
            
            document.getElementById('download-single-btn').disabled = false;
            document.getElementById('download-single-pdf-btn').disabled = false;
            document.getElementById('print-single-btn').disabled = false;
        }

        // Robust Clipboard Helper
        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                return navigator.clipboard.writeText(text);
            } else {
                return new Promise((resolve, reject) => {
                    try {
                        const textArea = document.createElement("textarea");
                        textArea.value = text;
                        textArea.style.position = "fixed";
                        textArea.style.top = "0";
                        textArea.style.left = "0";
                        textArea.style.opacity = "0";
                        document.body.appendChild(textArea);
                        textArea.focus();
                        textArea.select();
                        const successful = document.execCommand('copy');
                        document.body.removeChild(textArea);
                        if (successful) resolve();
                        else reject(new Error("Copy command failed"));
                    } catch (err) {
                        reject(err);
                    }
                });
            }
        }

        // Copy URL to Clipboard
        function copyUrl() {
            const copyText = document.getElementById("node-url");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            
            copyToClipboard(copyText.value)
                .then(() => {
                    const btn = document.getElementById('copy-btn');
                    btn.innerText = 'コピー済';
                    btn.style.backgroundColor = 'var(--primary-color)';
                    btn.style.color = 'white';
                    setTimeout(() => {
                        btn.innerText = 'コピー';
                        btn.style.backgroundColor = 'white';
                        btn.style.color = 'var(--primary-color)';
                    }, 2000);
                    log(`リンクURLをコピーしました: ${selectedNode.name}`, 'success');
                })
                .catch(err => {
                    log(`クリップボードへのコピーに失敗しました: ${err}`, 'error');

        }

        // Download Single QR Code (PNG)
        function downloadSingle() {
            if (!selectedNode) return;
            
            const previewContainer = document.getElementById('qr-preview-container');
            const canvas = previewContainer.querySelector('canvas');
            let dataUrl = null;
            
            if (canvas) {
                dataUrl = canvas.toDataURL("image/png");
            } else {
                const img = previewContainer.querySelector('img');
                if (img) dataUrl = img.src;
            }
            
            if (dataUrl) {
                const safeName = selectedNode.name.replace(/[\/\\:*?"<>|]/g, '_');
                const fileName = `${selectedNode.floorId}F_${safeName}.png`;
                
                try {
                    // Try parsing DataURL into Blob for FileSaver
                    const parts = dataUrl.split(',');
                    const byteString = atob(parts[1]);
                    const mimeString = parts[0].split(':')[1].split(';')[0];
                    const ab = new ArrayBuffer(byteString.length);
                    const ia = new Uint8Array(ab);
                    for (let i = 0; i < byteString.length; i++) {
                        ia[i] = byteString.charCodeAt(i);
                    }
                    const blob = new Blob([ab], {type: mimeString});
                    saveAs(blob, fileName);
                } catch (e) {
                    // Fallback to traditional anchor tag click
                    const link = document.createElement('a');
                    link.href = dataUrl;
                    link.download = fileName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
                log(`QRコードを個別保存しました: ${fileName}`, 'success');
            } else {
                alert("QRコード画像の取得に失敗しました。");
            }
        }

        // Bulk Zip Export Generator
        async function generateAll() {
            if (allNodes.length === 0) await loadData();
            if (allNodes.length === 0) {
                alert("有効な地点データが見つかりません。");
                return;
            }

            const btn = document.getElementById('genBtn');
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="btn-icon spinning" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                </svg>
                生成中...
            `;
            
            // Switch tabs to show logs visually during bulk export
            switchTab('logs');

            const zip = new JSZip();
            const folder = zip.folder("qr_code");

            const targetDiv = document.getElementById('qr-target');
            const baseUrl = window.location.href.split('?')[0].replace(/qr\.html$/, 'map.html');

            log(`ベースURL: ${baseUrl}`, 'info');
            log(`一括生成処理を開始します。対象件数: ${allNodes.length}件`, 'info');

            let count = 0;
            const total = allNodes.length;

            for (const node of allNodes) {
                count++;
                const pct = Math.floor((count / total) * 100);
                document.getElementById('progress').style.width = `${pct}%`;
                document.getElementById('progress-percent').innerText = `${pct}%`;
                document.getElementById('status-text').innerText = `生成中 ${count}/${total}: ${node.name}`;

                // Render live preview directly inside previewContainer (attached to DOM)
                selectNode(node);

                // Yield to allow qrcodejs/canvas rendering
                await new Promise(r => setTimeout(r, 45));

                let dataUrl = null;
                const previewContainer = document.getElementById('qr-preview-container');
                const canvas = previewContainer.querySelector('canvas');

                if (canvas) {
                    dataUrl = canvas.toDataURL("image/png");
                } else {
                    const img = previewContainer.querySelector('img');
                    if (img) dataUrl = img.src;
                }

                if (dataUrl) {
                    const safeName = node.name.replace(/[\/\\:*?"<>|]/g, '_');
                    const fileName = `${node.floorId}F_${safeName}.png`;

                    const base64Data = dataUrl.split(',')[1];
                    folder.file(fileName, base64Data, { base64: true });

                    log(`生成成功: ${fileName}`, 'success');
                } else {
                    log(`QRコード生成に失敗しました: ${node.name}`, 'error');
                }
            }

            log("全地点のQRコード画像生成が完了しました。ZIPファイルの圧縮を開始します...", 'info');
            document.getElementById('status-text').innerText = "ZIP圧縮中...";

            try {
                const content = await zip.generateAsync({ type: "blob" });
                saveAs(content, "qr_codes.zip");
                log("ZIPファイルの圧縮が完了し、ダウンロードが開始されました。", 'success');
                document.getElementById('status-text').innerText = "ダウンロード完了";
            } catch (err) {
                log(`ZIP圧縮中にエラーが発生しました: ${err.message}`, 'error');
                document.getElementById('status-text').innerText = "圧縮エラー";
            }

            btn.disabled = false;
            btn.innerHTML = `
                <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M20.54 5.23l-1.39-1.68C18.88 3.21 18.47 3 18 3H6c-.47 0-.88.21-1.16.55L3.46 5.23C3.17 5.57 3 6.02 3 6.5V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6.5c0-.48-.17-.93-.46-1.27zM12 17.5L6.5 12H10v-3h4v3h3.5L12 17.5zM5.12 5l.82-1h12.06l.82 1H5.12z"/>
                </svg>
                一括生成とZIP保存
            `;
            
            // Restore selection state
            if (selectedNode) {
                selectNode(selectedNode);
            }
        }

        // Generate QR code inside placard placeholder
        async function generateQRForPlacard(node, targetId, baseUrl) {
            const qrUrl = `${baseUrl}?current=${node.fullId}`;
            const container = document.getElementById(`qr-holder-${targetId}`);
            if (!container) return;
            container.innerHTML = '';
            new QRCode(container, {
                text: qrUrl,
                width: 512,
                height: 512,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });
            // Yield a tiny bit to allow rendering
            await new Promise(r => setTimeout(r, 60));
        }

        // Download single placard PDF
        async function downloadSinglePDF() {
            if (!selectedNode) return;
            
            const target = document.getElementById('print-canvas-target');
            target.innerHTML = '';
            
            const uniqueId = `single-pdf-${Date.now()}`;
            target.innerHTML = buildPlacardHTML(selectedNode, uniqueId);
            
            const baseUrl = window.location.href.split('?')[0].replace(/qr\.html$/, 'map.html');
            await generateQRForPlacard(selectedNode, uniqueId, baseUrl);
            
            const safeName = selectedNode.name.replace(/[\/\\:*?"<>|]/g, '_');
            const fileName = `Placard_${selectedNode.floorId}F_${safeName}.pdf`;
            
            const opt = {
                margin:       0,
                filename:     fileName,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak:    { mode: ['css', 'legacy'] }
            };
            
            log(`PDF生成を開始します: ${fileName}`, 'info');
            try {
                await html2pdf().set(opt).from(target).save();
                log(`PDFのダウンロードを開始しました: ${fileName}`, 'success');
            } catch (err) {
                log(`PDF生成中にエラーが発生しました: ${err.message}`, 'error');
                alert("PDF生成に失敗しました。");
            } finally {
                target.innerHTML = '';
            }
        }
